        // ── Seed function ─────────────────────────────────────────────

        window.seedPages = async function () {
            const btn = document.getElementById('seed-btn');
            btn.disabled = true;
            btn.textContent = 'Seeding...';
            log('Starting database seeding...', 'info');

            try {
                for (const page of pages) {
                    const docRef = doc(db, 'pageContent', page.id);
                    await setDoc(docRef, {
                        pageId: page.id,
                        name: page.name,
                        path: page.path,
                        sections: page.sections,
                        lastModified: new Date().toISOString()
                    });
                    log(`✅ Seeded: ${page.name} (${page.sections.length} sections)`, 'success');
                }

                // Also update the legacy "pages" collection so the page list still works
                for (const page of pages) {
                    const docRef = doc(db, 'pages', page.id);
                    await setDoc(docRef, {
                        name: page.name,
                        path: page.path,
                        type: 'page',
                        content: '',
                        lastModified: new Date().toISOString()
                    }, { merge: true });
                    log(`  📄 Updated pages collection: ${page.name}`, 'info');
                }

                log('\n🎉 Database seeding complete!', 'success');
            } catch (error) {
                log('❌ Seed error: ' + error.message, 'error');
                console.error('Seed error:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Seed Page Content';
            }
        };

        // ── Clear function ────────────────────────────────────────────

        window.clearPages = async function () {
            if (!confirm('Are you sure you want to clear ALL page content? This cannot be undone.')) return;

            const btn = document.getElementById('clear-btn');
            btn.disabled = true;
            btn.textContent = 'Clearing...';

            try {
                // Clear pageContent collection
                const snapshot = await getDocs(collection(db, 'pageContent'));
                for (const d of snapshot.docs) {
                    await deleteDoc(doc(db, 'pageContent', d.id));
                    log(`🗑️ Deleted pageContent: ${d.id}`, 'info');
                }

                // Clear pages collection
                const pagesSnapshot = await getDocs(collection(db, 'pages'));
                for (const d of pagesSnapshot.docs) {
                    await deleteDoc(doc(db, 'pages', d.id));
                    log(`🗑️ Deleted pages: ${d.id}`, 'info');
                }

                log('\n✅ All page data cleared.', 'success');
            } catch (error) {
                log('❌ Clear error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Clear All Pages';
            }
